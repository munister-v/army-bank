<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оператор — Digital Army Bank</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div>
        <div class="brand">Digital Army Bank — Оператор</div>
        <p class="muted" id="operatorUser">Завантаження…</p>
      </div>
      <nav class="menu">
        <a class="menu-btn nav-link" href="/dashboard">На головну</a>
      </nav>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="secondary-btn">Вийти</button>
      </div>
    </aside>
    <main class="content">
      <h1>Нарахування виплати</h1>
      <form id="payoutForm" class="card" style="max-width: 420px;">
        <label>Користувач (soldier)<select name="user_id" required id="userSelect"><option value="">— Обрати —</option></select></label>
        <label>Назва<input name="title" value="Бойова виплата" required></label>
        <label>Тип<input name="payout_type" value="combat"></label>
        <label>Сума (грн)<input name="amount" type="number" step="0.01" required></label>
        <button type="submit">Нарахувати</button>
      </form>
      <div class="card" style="margin-top: 20px;">
        <h2>Список військових (soldier)</h2>
        <div id="soldiersList" class="list"></div>
      </div>
      <footer class="weego-footer">
      <a href="https://weego-web.github.io/army.html" target="_blank" rel="noopener">WeeGo Studio</a>
      <span> · </span>
      <a href="https://munister.com.ua/bank" target="_blank" rel="noopener">munister.com.ua/bank</a>
      </footer>
    </main>
  </div>
  <div id="toast" class="toast hidden"></div>
  <script src="/js/api.js"></script>
  <script src="/js/operator.js"></script>
</body>
</html>
