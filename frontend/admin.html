<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Адмін — Digital Army Bank</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div>
        <div class="brand">Digital Army Bank — Адмін</div>
        <p class="muted" id="adminUser">Завантаження…</p>
      </div>
      <nav class="menu">
        <a class="menu-btn nav-link" href="/dashboard">На головну</a>
        <button type="button" class="menu-btn active" data-tab="users">Користувачі</button>
        <button type="button" class="menu-btn" data-tab="audit">Аудит</button>
      </nav>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="secondary-btn">Вийти</button>
      </div>
    </aside>
    <main class="content">
      <section id="usersTab" class="admin-tab">
        <h1>Користувачі</h1>
        <p class="muted">Фільтр за роллю: <select id="roleFilter"><option value="">Усі</option><option value="soldier">soldier</option><option value="operator">operator</option><option value="admin">admin</option></select></p>
        <div id="usersList" class="list"></div>
      </section>
      <section id="auditTab" class="admin-tab hidden">
        <h1>Аудит-логи</h1>
        <div id="auditList" class="list"></div>
      </section>
      <footer class="weego-footer">
      <a href="https://weego-web.github.io/army.html" target="_blank" rel="noopener">WeeGo Studio</a>
      <span> · </span>
      <a href="https://munister.com.ua/bank" target="_blank" rel="noopener">munister.com.ua/bank</a>
      </footer>
    </main>
  </div>
  <div id="toast" class="toast hidden"></div>
  <script src="/js/api.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
