<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Адмін — Цифровий Армійський Банк</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div>
        <div class="brand">Цифровий Армійський Банк — Адмін</div>
        <p class="muted" id="adminUser">Завантаження…</p>
      </div>
      <nav class="menu">
        <a class="menu-btn nav-link" href="/dashboard">На головну</a>
        <button type="button" class="menu-btn active" data-tab="users">Користувачі</button>
        <button type="button" class="menu-btn" data-tab="audit">Аудит</button>
      </nav>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="secondary-btn">Вийти</button>
      </div>
    </aside>
    <main class="content">
      <section id="usersTab" class="admin-tab">
        <h1>Користувачі</h1>
        <p class="muted">Фільтр за роллю: <select id="roleFilter"><option value="">Усі</option><option value="soldier">Військовий</option><option value="operator">Оператор</option><option value="admin">Адмін</option><option value="platform_admin">Платформа</option></select></p>
        <div class="card" style="padding: 0;">
          <table class="table" aria-label="Таблиця користувачів">
            <thead>
              <tr>
                <th>ID</th>
                <th>Користувач</th>
                <th>Контакти</th>
                <th>Роль</th>
                <th>Дії</th>
              </tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
          </table>
        </div>
      </section>
      <section id="auditTab" class="admin-tab hidden">
        <h1>Аудит-логи</h1>
        <div id="auditList" class="list"></div>
      </section>
      <footer class="weego-footer">
      <a href="https://weego-web.github.io/army.html" target="_blank" rel="noopener">WeeGo Studio</a>
      <span> · </span>
      <a href="https://munister.com.ua/bank" target="_blank" rel="noopener">munister.com.ua/bank</a>
      </footer>
    </main>
  </div>
  <div id="backdrop" class="backdrop"></div>
  <aside id="drawer" class="drawer" aria-label="User details">
    <div class="drawer-header">
      <div>
        <strong id="drawerTitle">Користувач</strong>
        <div class="subtle" id="drawerSub">—</div>
      </div>
      <button id="drawerClose" class="ghost-btn" type="button">Закрити</button>
    </div>
    <div class="drawer-body">
      <div class="stack">
        <div class="card" style="box-shadow:none;">
          <div class="subtle">Рахунок</div>
          <div style="margin-top:8px;"><strong id="drawerBalance">—</strong></div>
          <div class="subtle" id="drawerAccount">—</div>
        </div>
        <div class="card" style="box-shadow:none;">
          <div class="subtle">Останні транзакції</div>
          <div id="drawerTx" class="list" style="margin-top:12px;"></div>
        </div>
      </div>
    </div>
    <div class="drawer-footer">
      <div class="btn-row">
        <a class="menu-btn nav-link" id="drawerOpenBank" href="/dashboard">Відкрити як користувач</a>
      </div>
    </div>
  </aside>
  <div id="toast" class="toast hidden"></div>
  <script src="/js/api.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
