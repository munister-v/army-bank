# Render.com — автоматичний деплой з GitHub
# Підключи репо army-bank → render.com → New → Blueprint

databases:
  - name: army-bank-db
    databaseName: army_bank
    user: army_bank_user
    plan: free          # Render Free PostgreSQL (persistent)

services:
  - type: web
    name: army-bank
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -c deploy/gunicorn.conf.py backend.app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: army-bank-db
          property: connectionString   # persistent PostgreSQL URL
      - key: SECRET_KEY
        generateValue: true            # Render генерує автоматично
      - key: TOKEN_TTL_HOURS
        value: "720"                   # 30 днів
      - key: DEBUG
        value: "0"
