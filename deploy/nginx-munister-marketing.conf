# Маркетинг army-admin / army-bank через той самий Gunicorn, що й /bank
# (Flask роздає каталоги marketing/munister-army-admin та munister-army-bank).
# Додайте в server { ... } для munister.com.ua (порт як у proxy_pass /bank).

location /army-admin/ {
    proxy_pass http://127.0.0.1:5000/army-admin/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
    proxy_buffering off;
}

location /army-bank/ {
    proxy_pass http://127.0.0.1:5000/army-bank/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
    proxy_buffering off;
}
