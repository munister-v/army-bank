# Nginx — фрагмент для munister.com.ua/bank
# Додайте цей блок всередину server { ... } для munister.com.ua
# (наприклад в /etc/nginx/sites-available/munister.com.ua або в основний server block)
#
# Сторінки /army-admin/ та /army-bank/ (статика з marketing/) — див. nginx-munister-marketing.conf

    location /bank {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
    }
